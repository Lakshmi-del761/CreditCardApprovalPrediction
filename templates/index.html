<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Approval Prediction</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container py-5">

    <div class="text-center mb-4">
        <i class="bi bi-credit-card-2-front-fill display-3 text-primary"></i>
        <h1 class="mt-3">Credit Card Approval Prediction</h1>
        <p class="text-muted">
            Enter applicant details to predict credit card approval.
        </p>
    </div>

    <div class="card shadow-lg border-0">

        <div class="card-body p-4">

            <form id="predictionForm">

                <div class="row g-3">

                    <!-- Gender -->
                    <div class="col-md-4">
                        <label class="form-label">Gender</label>
                        <select class="form-select" id="Gender" required>
                            <option value="">Select</option>
                            <option value="1">Male</option>
                            <option value="0">Female</option>
                        </select>
                    </div>

                    <!-- Age -->
                    <div class="col-md-4">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" id="Age" required>
                    </div>

                    <!-- Debt -->
                    <div class="col-md-4">
                        <label class="form-label">Debt</label>
                        <input type="number" step="0.01" class="form-control" id="Debt" required>
                    </div>

                    <!-- Married -->
                    <div class="col-md-4">
                        <label class="form-label">Married</label>
                        <select class="form-select" id="Married" required>
                            <option value="">Select</option>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <!-- Bank Customer -->
                    <div class="col-md-4">
                        <label class="form-label">Bank Customer</label>
                        <select class="form-select" id="BankCustomer" required>
                            <option value="">Select</option>
                            <option value="1">Yes</option>
                            <option value="0">No</option>
                        </select>
                    </div>

                    <!-- Industry -->
                    <div class="col-md-4">
                        <label class="form-label">Industry</label>
                        <select class="form-select" id="Industry" required>

                            <option value="CommunicationServices">Communication Services</option>
                            <option value="ConsumerDiscretionary">Consumer Discretionary</option>
                            <option value="ConsumerStaples">Consumer Staples</option>
                            <option value="Education">Education</option>
                            <option value="Energy">Energy</option>
                            <option value="Financials">Financials</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Industrials">Industrials</option>
                            <option value="InformationTechnology">Information Technology</option>
                            <option value="Materials">Materials</option>
                            <option value="Real Estate">Real Estate</option>
                            <option value="Research">Research</option>
                            <option value="Transport">Transport</option>
                            <option value="Utilities">Utilities</option>

                        </select>
                    </div>

                    <!-- Ethnicity -->
                    <div class="col-md-4">
                        <label class="form-label">Ethnicity</label>
                        <select class="form-select" id="Ethnicity">

                            <option value="Asian">Asian</option>
                            <option value="Black">Black</option>
                            <option value="Latino">Latino</option>
                            <option value="Other">Other</option>
                            <option value="White">White</option>

                        </select>
                    </div>

                    <!-- Years Employed -->
                    <div class="col-md-4">
                        <label class="form-label">Years Employed</label>
                        <input type="number" step="0.01" class="form-control" id="YearsEmployed" required>
                    </div>

                    <!-- Prior Default -->
                    <div class="col-md-4">
                        <label class="form-label">Prior Default</label>
                        <select class="form-select" id="PriorDefault">

                            <option value="1">Yes</option>
                            <option value="0">No</option>

                        </select>
                    </div>

                    <!-- Employed -->
                    <div class="col-md-4">
                        <label class="form-label">Employed</label>
                        <select class="form-select" id="Employed">

                            <option value="1">Yes</option>
                            <option value="0">No</option>

                        </select>
                    </div>

                    <!-- Credit Score -->
                    <div class="col-md-4">
                        <label class="form-label">Credit Score</label>
                        <input type="number" class="form-control" id="CreditScore" required>
                    </div>

                    <!-- Driver License -->
                    <div class="col-md-4">
                        <label class="form-label">Driver's License</label>
                        <select class="form-select" id="DriversLicense">

                            <option value="1">Yes</option>
                            <option value="0">No</option>

                        </select>
                    </div>

                    <!-- Citizen -->
                    <div class="col-md-4">
                        <label class="form-label">Citizen</label>
                        <select class="form-select" id="Citizen">

                            <option value="ByBirth">By Birth</option>
                            <option value="ByOtherMeans">By Other Means</option>
                            <option value="Temporary">Temporary</option>

                        </select>
                    </div>

                    <!-- Zip -->
                    <div class="col-md-4">
                        <label class="form-label">Zip Code</label>
                        <input type="number" class="form-control" id="ZipCode" required>
                    </div>

                    <!-- Income -->
                    <div class="col-md-4">
                        <label class="form-label">Income</label>
                        <input type="number" class="form-control" id="Income" required>
                    </div>

                </div>

                <div class="text-center mt-4">

                    <button class="btn btn-primary btn-lg px-5" id="predictBtn">
                        <i class="bi bi-cpu"></i>
                        Get Prediction
                    </button>

                </div>

            </form>
            <div class="loading" id="loading">
               <div class="spinner-border text-primary"></div>
               <p class="mt-2">Predicting...</p>
            </div>

<div id="result" class="result-card"></div>

            <div id="result" class="mt-4"></div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
